<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Digital Clock</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h2>Digital Clock</h2>

        <div class="clock" id="clock">
            00:00:00
        </div>

        <div class="date" id="date">
            Monday, 01 January 2026
        </div>

        <div class="greeting" id="greeting">
            Good Morning ☀️
        </div>

        <div class="status">
            <span class="live-dot"></span>
            <span>LIVE</span>
        </div>

        <div class="timezone">
            India Standard Time (UTC +05:30)
        </div>

    </div>

    <footer>
        Developed with ❤️ by <strong>Pratik</strong>
    </footer>

    <script src="script.js"></script>

</body>
</html>
